<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>끄적끄적 책갈피</title>
  
  <link rel="icon" type="image/png" href="mainbookicon.png">
  <meta property="og:image" content="mainbookicon.png">
  <meta property="og:title" content="끄적끄적 책갈피">
  <meta property="og:description" content="강하빈의 갓생 살기 프로젝트">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://cdn.jsdelivr.net/npm/react@18.2.0/+esm",
        "react-dom/client": "https://cdn.jsdelivr.net/npm/react-dom@18.2.0/client/+esm",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
  </script>
</head>
<body class="bg-[#fffafa]">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from 'firebase/firestore';

    // 💡 체리레코드 파이어베이스 열쇠
    const firebaseConfig = {
      apiKey: "AIzaSyDw9Em0jI2l8bI-qF_RKE1x6VqW777gFuQ",
      authDomain: "cherryrecord-f8101.firebaseapp.com",
      projectId: "cherryrecord-f8101",
      storageBucket: "cherryrecord-f8101.firebasestorage.app",
      messagingSenderId: "928870462210",
      appId: "1:928870462210:web:df8ade4c3cd5caa9b7c81b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    // 💡 이 고유 ID 덕분에 PC, 모바일 어디서든 똑같은 창고를 바라보게 됩니다. 영구 연동의 핵심!
    const appId = 'my-bookmark-app';

    // --- Helper Functions ---
    const getLocalDate = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    const resizeImage = (file) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let { width, height } = img;
            const maxSize = 600;
            if (width > height && width > maxSize) { height *= maxSize / width; width = maxSize; }
            else if (height > maxSize) { width *= maxSize / height; height = maxSize; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.8));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    // 달력 형광펜을 위한 다채로운 파스텔 색상표
    const PASTEL_COLORS = ['#fedcf0', '#dceaf6', '#e6f4ea', '#fff4d4', '#f1e6f9', '#ffe4e1'];
    const getRandomColor = () => PASTEL_COLORS[Math.floor(Math.random() * PASTEL_COLORS.length)];

    const EmptyHeartIcon = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f24182" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
    );

    const HeartIcon = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="#f24182" stroke="#f24182" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
    );

    // --- Main App Component ---
    function App() {
      const [user, setUser] = useState(null);
      const [books, setBooks] = useState([]);
      const [activeTab, setActiveTab] = useState('library'); 
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingBook, setEditingBook] = useState(null);
      const [viewingBook, setViewingBook] = useState(null);

      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (u) => {
          if (u) setUser(u);
          else signInAnonymously(auth);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const booksRef = collection(db, 'artifacts', appId, 'public', 'data', 'books');
        const unsubscribe = onSnapshot(booksRef, (snapshot) => {
          const booksData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          booksData.sort((a, b) => b.createdAt - a.createdAt);
          setBooks(booksData);
        }, (err) => {
          console.error("Firestore 실시간 감시 에러:", err);
        });
        return () => unsubscribe();
      }, [user]);

      const openModal = (book = null) => { setEditingBook(book); setIsModalOpen(true); };
      const closeModal = () => { setEditingBook(null); setIsModalOpen(false); };

      // 🛠️ 저장 에러 발생 시 명확하게 팝업창에 알려주도록 수정
      const handleSaveBook = async (bookData) => {
        try {
          const path = ['artifacts', appId, 'public', 'data', 'books'];
          if (editingBook) {
            await updateDoc(doc(db, ...path, editingBook.id), { ...bookData, updatedAt: Date.now() });
            if (viewingBook?.id === editingBook.id) setViewingBook(prev => ({ ...prev, ...bookData }));
          } else {
            await addDoc(collection(db, ...path), { ...bookData, isBookmarked: false, bgColor: getRandomColor(), createdAt: Date.now() });
          }
          closeModal(); // 완벽하게 저장되었을 때만 창 닫기
        } catch (e) { 
          console.error("저장 중 오류 발생:", e); 
          // 에러를 던져서 BookModal이 받게 만듦
          throw new Error("데이터베이스 연결 실패! 파이어베이스에서 'Firestore Database'를 생성하셨는지 확인해주세요.");
        }
      };

      const handleDeleteBook = async (id) => {
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', id));
          if (viewingBook?.id === id) setViewingBook(null);
        } catch (e) { console.error(e); }
      };

      const handleToggleBookmark = async (book) => {
        try {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'books', book.id), { isBookmarked: !book.isBookmarked });
        } catch (e) { console.error(e); }
      };

      return (
        <div className="min-h-screen text-[#585858] font-light" style={{ fontFamily: "'Pretendard', sans-serif" }}>
          <style dangerouslySetInnerHTML={{__html: `
            @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Light.woff2') format('woff2'); font-weight: 300; }
            @font-face { font-family: 'Pretendard-Medium'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Medium.woff2') format('woff2'); font-weight: 500; }
            @font-face { font-family: 'OngleipKonkon'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2412-1@1.0/Ownglyph_corncorn-Rg.woff2') format('woff2'); font-weight: normal; }
            .font-konkon { font-family: 'OngleipKonkon', cursive; }
            .font-medium { font-family: 'Pretendard-Medium', sans-serif; font-weight: 500; }
            .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background: #fedcf0; border-radius: 10px; }
          `}} />

          <header className="bg-[#fedcf0] sticky top-0 z-10 shadow-sm">
            <div className="max-w-6xl mx-auto px-4 py-3 flex flex-col md:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-2 cursor-pointer" onClick={() => setActiveTab('library')}>
                <img src="mainbookicon.png" alt="Logo" className="w-10 h-10 object-contain" onError={(e) => e.target.style.display='none'} />
                <h1 className="text-[#f24182] font-konkon text-4xl pt-2">끄적끄적 책갈피</h1>
              </div>
              <nav className="flex gap-6">
                {['library', 'bookmarks', 'calendar'].map(t => (
                  <button key={t} onClick={() => setActiveTab(t)} className={`pb-1 border-b-2 transition-colors ${activeTab === t ? 'border-[#f24182] font-medium text-[#f24182]' : 'border-transparent hover:text-[#f24182]'}`}>
                    {t === 'library' ? '전체 서재' : t === 'bookmarks' ? '책갈피' : '독서 달력'}
                  </button>
                ))}
              </nav>
              <button onClick={() => openModal()} className="bg-[#f24182] text-white font-konkon text-2xl px-6 py-2 rounded-full hover:scale-105 transition-transform shadow-md">+ 새 책 기록하기</button>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-8">
            {activeTab === 'calendar' ? <CalendarView books={books} /> : 
             <ListView books={activeTab === 'bookmarks' ? books.filter(b => b.isBookmarked) : books} onToggle={handleToggleBookmark} onEdit={openModal} onDelete={handleDeleteBook} onCardClick={setViewingBook} isBookmarkPage={activeTab === 'bookmarks'} />}
          </main>

          {isModalOpen && <BookModal book={editingBook} onClose={closeModal} onSave={handleSaveBook} />}
          {viewingBook && <BookDetailModal book={viewingBook} onClose={() => setViewingBook(null)} onEdit={(b) => { setViewingBook(null); openModal(b); }} onDelete={handleDeleteBook} />}
        </div>
      );
    }

    function ListView({ books, onToggle, onEdit, onDelete, onCardClick, isBookmarkPage }) {
      return (
        <div className="space-y-8 animate-fade-in">
          <div className="bg-white rounded-3xl p-8 shadow-sm border border-[#fedcf0]/50 relative">
            <h2 className="font-konkon text-4xl text-[#f24182] mb-2">{isBookmarkPage ? '나만의 책갈피' : '하빈이가 읽은 책'}</h2>
            <p className="text-[#585858]" style={{ letterSpacing: '-0.75px' }}>
              {isBookmarkPage ? '마음에 쏙 들었던 책들을 모아 보는 공간입니다.' : '이곳은 강하빈이 기록한 모든 도서 정보와 감상이 모여 있는 메인 공간임. 각 도서는 사진, 제목, 저자, 그리고 100자 이내의 가벼운 한 줄 평을 기록하고 카드의 하트를 눌러 책갈피에 추가해 보세여.'}
            </p>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            {books.map(book => (
              <div key={book.id} onClick={() => onCardClick(book)} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col transform transition hover:-translate-y-1 cursor-pointer">
                <div className="h-48 relative flex items-center justify-center p-4 group" style={{ backgroundColor: book.bgColor || '#d8e8f3' }}>
                  <div className="absolute top-3 right-3 flex items-center gap-2 z-10" onClick={e => e.stopPropagation()}>
                    <div className="opacity-0 group-hover:opacity-100 transition-opacity flex gap-2 mr-2">
                      <button onClick={() => onEdit(book)} className="text-xs text-gray-600 bg-white/80 px-2 py-1 rounded shadow-sm hover:text-[#f24182]">수정</button>
                      <button onClick={() => { if(window.confirm('정말 삭제할까요?')) onDelete(book.id); }} className="text-xs text-red-500 bg-white/80 px-2 py-1 rounded shadow-sm hover:bg-red-50">삭제</button>
                    </div>
                    <button onClick={() => onToggle(book)} className="p-1.5 bg-white/50 rounded-full shadow-sm">{book.isBookmarked ? <HeartIcon /> : <EmptyHeartIcon />}</button>
                  </div>
                  {book.images?.length > 0 ? (
                    <div className="relative w-24 h-32 shadow-md bg-white/50 flex items-center justify-center rounded overflow-hidden">
                      <img src={book.images[0]} className="w-full h-full object-cover" />
                      {book.images.length > 1 && <div className="absolute bottom-0 right-0 bg-black/60 text-white text-[10px] px-1.5 py-0.5 rounded-tl">+ {book.images.length - 1}</div>}
                    </div>
                  ) : <img src="openbookicon.png" className="w-16 h-16 object-contain mix-blend-multiply opacity-80" />}
                </div>
                <div className="p-5 flex-1 flex flex-col">
                  <h3 className="font-medium text-lg text-gray-800 line-clamp-1">{book.title}</h3>
                  <p className="text-sm text-gray-500 mb-4">{book.author}</p>
                  <div className="bg-[#fff5fa] p-3 rounded-xl flex-1 relative"><span className="absolute top-2 left-2 text-[#f24182] font-konkon text-xl leading-none">“</span><p className="text-sm text-gray-700 mt-2 px-2 line-clamp-3 break-keep">{book.review}</p></div>
                </div>
              </div>
            ))}
            {books.length === 0 && <div className="col-span-full text-center py-20 text-gray-400">아직 기록된 책이 없습니다.</div>}
          </div>
        </div>
      );
    }

    // 🛠️ 완벽한 형광펜 효과를 위해 틈(gap)을 없애고 테두리(border)로만 달력 구현
    function CalendarView({ books }) {
      const [curr, setCurr] = useState(new Date());
      const year = curr.getFullYear(), month = curr.getMonth();
      const days = [];
      const first = new Date(year, month, 1).getDay();
      const last = new Date(year, month + 1, 0).getDate();
      for (let i = 0; i < first; i++) days.push(null);
      for (let i = 1; i <= last; i++) days.push(new Date(year, month, i));

      const sortedBooks = useMemo(() => [...books].sort((a, b) => new Date(a.startDate) - new Date(b.startDate)), [books]);

      return (
        <div className="bg-white rounded-3xl p-6 sm:p-10 shadow-sm border border-[#fedcf0]/50 animate-fade-in">
          <div className="flex justify-between items-center mb-8">
            <button onClick={() => setCurr(new Date(year, month - 1, 1))} className="text-[#f24182] p-2 hover:bg-[#fedcf0] rounded-full transition">&lt; 이전달</button>
            <h2 className="font-konkon text-4xl text-[#585858]">{year}년 {month + 1}월</h2>
            <button onClick={() => setCurr(new Date(year, month + 1, 1))} className="text-[#f24182] p-2 hover:bg-[#fedcf0] rounded-full transition">다음달 &gt;</button>
          </div>
          <div className="grid grid-cols-7 text-center font-medium mb-2">
            {['일','월','화','수','목','금','토'].map((d,i) => <div key={d} className={i===0?'text-red-400':i===6?'text-blue-400':''}>{d}</div>)}
          </div>
          
          <div className="grid grid-cols-7 border-t border-l border-gray-100/80 bg-white">
            {days.map((d, i) => {
              if (!d) return <div key={i} className="min-h-[100px] border-b border-r border-gray-100/80 bg-gray-50/30"></div>;
              
              const daily = sortedBooks.filter(b => {
                const s = new Date(b.startDate).setHours(0,0,0,0);
                const e = new Date(b.endDate).setHours(23,59,59,999);
                return d.getTime() >= s && d.getTime() <= e;
              });
              const isToday = d.toDateString() === new Date().toDateString();

              return (
                <div key={i} className={`min-h-[100px] border-b border-r border-gray-100/80 p-0 relative ${isToday ? 'bg-[#fff5fa]/40' : 'bg-white'}`}>
                  <div className={`text-xs p-1.5 font-medium ${d.getDay()===0?'text-red-400':d.getDay()===6?'text-blue-400':''}`}>{d.getDate()}</div>
                  <div className="flex flex-col space-y-[2px] mt-1 pb-2">
                    {daily.map(b => {
                       const s = new Date(b.startDate).setHours(0,0,0,0);
                       const e = new Date(b.endDate).setHours(0,0,0,0);
                       const c = d.getTime();
                       const isStart = c === s;
                       const isEnd = c === e;
                       const showTitle = isStart || d.getDay() === 0 || d.getDate() === 1;

                       // 형광펜 디자인: 시작일엔 왼쪽 마진/둥글기, 종료일엔 오른쪽 마진/둥글기, 중간은 마진 없이 꽉 채움
                       return (
                         <div key={b.id} className={`text-[10px] py-[3px] text-gray-700 z-10 flex items-center min-h-[20px] shadow-sm
                           ${isStart ? 'ml-1.5 rounded-l-md pl-1.5' : 'ml-0 pl-2'}
                           ${isEnd ? 'mr-1.5 rounded-r-md pr-1.5' : 'mr-0 pr-2'}
                           ${!isStart && !isEnd ? 'rounded-none' : ''}`}
                           style={{ backgroundColor: b.bgColor || '#fedcf0' }}>
                           {showTitle && <span className="font-medium truncate drop-shadow-sm leading-none">{b.title}</span>}
                         </div>
                       )
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function BookModal({ book, onClose, onSave }) {
      const [title, setTitle] = useState(book?.title || '');
      const [author, setAuthor] = useState(book?.author || '');
      const [startDate, setStartDate] = useState(book?.startDate || getLocalDate());
      const [endDate, setEndDate] = useState(book?.endDate || getLocalDate());
      const [review, setReview] = useState(book?.review || '');
      const [images, setImages] = useState(book?.images || []); 
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState('');

      const handleImg = async (e) => {
        const files = Array.from(e.target.files);
        if (images.length + files.length > 3) return setErr('사진은 최대 3장까지 가능합니다.');
        setLoading(true); setErr('');
        try {
          const res = await Promise.all(files.map(resizeImage));
          setImages(prev => [...prev, ...res].slice(0, 3));
        } catch (e) { setErr('이미지 처리 중 오류가 발생했습니다.'); }
        finally { setLoading(false); }
      };

      // 🛠️ 에러 발생 시 팝업 멈춤 현상 해결
      const handleSubmit = async (e) => {
        e.preventDefault();
        setErr('');
        if (!title.trim() || !author.trim() || !review.trim()) return setErr('필수 항목을 모두 입력해주세요.');
        if (new Date(startDate) > new Date(endDate)) return setErr('종료일이 시작일보다 빠를 수 없습니다.');
        
        setLoading(true);
        try {
          await onSave({ title, author, startDate, endDate, review, images });
        } catch (error) {
          // 저장이 실패하면 이쪽으로 넘어와서 붉은 글씨로 에러를 보여주고 로딩을 풉니다.
          setErr(error.message || "알 수 없는 오류로 저장에 실패했습니다.");
          setLoading(false); 
        }
      };

      return (
        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in">
          <div className="bg-white rounded-3xl w-full max-w-lg shadow-2xl flex flex-col max-h-[90vh] overflow-hidden relative">
            <button onClick={onClose} className="absolute top-5 right-5 text-gray-400 hover:text-gray-600 transition z-10">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"></path></svg>
            </button>
            <div className="p-8 overflow-y-auto custom-scrollbar flex-1">
              <h2 className="font-konkon text-3xl text-[#f24182] mb-6">{book ? '기록 수정하기' : '새 책 기록하기'}</h2>
              <form onSubmit={handleSubmit} className="space-y-5">
                {err && <div className="bg-red-50 text-red-600 text-sm p-3 rounded-xl border border-red-200 font-medium break-keep">{err}</div>}
                <div>
                  <label className="block text-sm font-medium mb-1">책 제목 <span className="text-[#f24182]">*</span></label>
                  <input placeholder="책 제목을 입력해 주세요" value={title} onChange={e => setTitle(e.target.value)} maxLength={50} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#fedcf0]" />
                </div>
                <div>
                  <label className="block text-sm font-medium mb-1">저자 <span className="text-[#f24182]">*</span></label>
                  <input placeholder="저자를 입력해 주세요" value={author} onChange={e => setAuthor(e.target.value)} maxLength={30} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#fedcf0]" />
                </div>
                <div className="flex gap-4">
                  <div className="flex-1">
                    <label className="block text-sm font-medium mb-1">시작일</label>
                    <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="w-full p-2 bg-gray-50 border rounded-xl text-sm outline-none" />
                  </div>
                  <div className="flex-1">
                    <label className="block text-sm font-medium mb-1">종료일</label>
                    <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} min={startDate} className="w-full p-2 bg-gray-50 border rounded-xl text-sm outline-none" />
                  </div>
                </div>
                <div>
                  <div className="flex justify-between text-sm mb-1 font-medium"><span>사진 선택 (최대 3장)</span><span>{images.length}/3</span></div>
                  <input type="file" multiple accept="image/*" onChange={handleImg} className="text-xs mb-2 block w-full" disabled={loading} />
                  <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar">
                    {images.map((img, i) => (
                      <div key={i} className="relative w-16 h-16 shrink-0">
                        <img src={img} className="w-full h-full object-cover rounded-lg border" />
                        <button type="button" onClick={() => setImages(prev => prev.filter((_, idx) => idx !== i))} className="absolute -top-2 -right-2 bg-red-500 text-white w-5 h-5 rounded-full text-[10px] flex items-center justify-center shadow-md">×</button>
                      </div>
                    ))}
                  </div>
                </div>
                <div>
                  <label className="block text-sm font-medium mb-1">한 줄 평 <span className="text-[#f24182]">*</span></label>
                  <textarea placeholder="기록하고 싶은 구절이나 감상평을 남겨 주세요" value={review} onChange={e => setReview(e.target.value.slice(0, 100))} rows="4" className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none resize-none custom-scrollbar" />
                </div>
                <div className="flex gap-3 pt-2">
                  <button type="button" onClick={onClose} className="flex-1 p-3 bg-gray-100 rounded-2xl font-medium hover:bg-gray-200 transition">취소</button>
                  <button type="submit" disabled={loading} className="flex-1 p-3 bg-[#f24182] text-white rounded-2xl font-medium shadow-md hover:bg-[#d93672] transition disabled:opacity-50">
                    {loading ? '기록 저장 중...' : '등록하기'}
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      );
    }

    function BookDetailModal({ book, onClose, onEdit, onDelete }) {
      if (!book) return null;
      return (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[60] p-4 animate-fade-in" onClick={onClose}>
          <div className="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden relative flex flex-col max-h-[90vh]" onClick={e => e.stopPropagation()}>
            <div className="h-4 w-full shrink-0" style={{ backgroundColor: book.bgColor || '#fedcf0' }}></div>
            <div className="absolute top-8 right-6 flex items-center gap-3 z-10">
              <button onClick={() => onEdit(book)} className="text-sm text-gray-500 hover:text-[#f24182] transition font-medium">수정</button>
              <button onClick={() => { if(window.confirm('정말 삭제하시겠습니까?')) onDelete(book.id); }} className="text-sm text-gray-500 hover:text-red-500 transition font-medium">삭제</button>
              <div className="w-px h-4 bg-gray-300 mx-1"></div>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 transition">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"></path></svg>
              </button>
            </div>
            <div className="p-8 pb-6 overflow-y-auto flex-1 custom-scrollbar">
              <div className="pr-20 mb-6">
                <h2 className="font-medium text-2xl text-gray-800 mb-1 leading-snug break-keep">{book.title}</h2>
                <p className="text-gray-500 text-sm">{book.author}</p>
              </div>
              <div className="flex gap-4 text-sm text-gray-400 mb-6 bg-gray-50 p-3 rounded-xl inline-block">
                <span>독서 기간 : {book.startDate} ~ {book.endDate}</span>
              </div>
              {book.images && book.images.length > 0 ? (
                 <div className="flex gap-3 overflow-x-auto pb-4 mb-6 snap-x custom-scrollbar">
                   {book.images.map((img, idx) => (
                     <img key={idx} src={img} alt={`첨부사진 ${idx + 1}`} className="h-48 sm:h-56 w-auto object-contain rounded-xl snap-center shrink-0 border border-gray-100 shadow-sm bg-gray-50" />
                   ))}
                 </div>
              ) : (
                 <div className="flex justify-center py-6 mb-6 opacity-50 bg-[#fff5fa]/50 rounded-xl">
                    <img src="openbookicon.png" alt="빈 책 아이콘" className="w-16 h-16 object-contain mix-blend-multiply" />
                 </div>
              )}
              <div className="bg-[#fff5fa] p-5 rounded-2xl relative flex flex-col shadow-inner">
                <span className="text-[#f24182] font-konkon text-3xl leading-none opacity-50 absolute top-4 left-4">“</span>
                <div className="mt-6 max-h-[35vh] overflow-y-auto custom-scrollbar px-2">
                  <p className="text-gray-700 leading-relaxed whitespace-pre-wrap break-words text-base">{book.review}</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
